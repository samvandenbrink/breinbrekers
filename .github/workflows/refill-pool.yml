name: Refill Puzzle Pool

on:
  schedule:
    # Mondays 03:00 UTC, a few hours before the email workflow
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate pool
        run: python generate_pool.py --count 100 --out docs/puzzles.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/puzzles.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh puzzle pool"
            git push
          fi
